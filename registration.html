<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>registration</title>
</head>
<body>

    <h1>Registration Form</h1>

    <form>
        <div>
        <label for ="fname">First Name:*</label>
        <input type="text" id="fname" name="fname" required>
        </div><br>

        <div>
        <label for="lname">Last Name*:</label>
        <input type="text" id="lname" name="lsname" required>
        </div><br>

        <div>
        <label for="email">Email:*</labe>
        <input type="email" id="email" name="email" required>
        </div><br>

        <div>
            <label for="password">Password:*</label>
            <input type="password" id="password" name="password" required>
        </div><br>

        <div>
            <label for="confirm_password">Confirm Password:*</label>
            <input type="password" id="confirm_password" name="confirm_password" required>
        </div><br>

        <div>
            <label for="birthday">Birthday:</label>
            <input type="date" id="birthday" name="birthday">
        </div><br>

        
            <label>Gender Identity:</label>
      
        <br><br>

        <div>
            <input type="radio" id="male" name="gender">
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" >
            <label for ="female">Female</label>
            <input type="radio" id="non_binary" name="gender">
            <label for="non_binary">Non-binary</label>
            <input type="radio" id="no_answer" name="gender">
            <label for ="no_answer">I prefer not to answer</label>
        </div>

        <div>
            <p>A short description about myself:</p>
        </div>

        <div>
            <textarea name="description about myself" cols="40" rows="5"></textarea>
        </div><br>

        <div>
            <label for ="fav_language">Favorite Language:</label>
            <select  id="fav_language" name="Favorite Language:">
                <option>JavaScript</option>
                <option>CSS</option>
                <option>HTML</option>
            </select>
        </div><br>

        <div>
            <input type="checkbox" id="checkbox" name="checkbox" checked>
            <label for ="checkbox">Yes,I would like to recieve periodic email update</label>
        </div><br>

        
            <input type="submit" value="Create Account">
        

    </form>
    
</body>
</html>
